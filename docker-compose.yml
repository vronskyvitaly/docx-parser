services:
  docx-parser:
    build: .
    container_name: docx-parser
    restart: unless-stopped
    ports:
      - "8082:8082"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8082/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
